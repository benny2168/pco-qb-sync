<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: 'rgba(30, 41, 59, 0.7)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .gradient-text {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.5); }
        
        .pulse-indicator { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4 sm:px-6 lg:px-8 font-sans antialiased">
    <div class="max-w-7xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">
                    <span class="gradient-text">PCO to QuickBooks</span> Sync
                </h1>
                <p class="text-slate-400 mt-1 flex items-center gap-2 text-sm">
                    <i data-lucide="activity" class="w-4 h-4"></i> Dashboard & Logging
                </p>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="syncNowBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-full shadow-lg shadow-indigo-500/20 text-sm flex items-center gap-2 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i data-lucide="play" class="w-4 h-4" id="syncNowIcon"></i> 
                    <span id="syncNowText">Run Sync Now</span>
                </button>
                <div class="glass-card rounded-full px-6 py-2 flex items-center gap-3">
                    <div id="statusIndicator" class="w-3 h-3 rounded-full bg-slate-500"></div>
                    <span id="statusText" class="font-medium text-sm text-slate-300">Loading Status...</span>
                </div>
            </div>
        </header>

        <!-- Metrics Row -->
        <main class="mt-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="glass-card rounded-2xl p-5 flex flex-col justify-center gap-3">
                <h3 class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Sync Config</h3>
                
                <div class="flex items-center gap-2">
                    <div class="p-2 rounded-xl bg-indigo-500/10 text-indigo-400 shrink-0">
                        <i data-lucide="calendar-clock" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 flex items-center gap-1.5 flex-wrap">
                        <select id="schedFrequency" class="bg-slate-900/50 border border-slate-700/50 rounded-lg px-2 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                        <select id="schedDay" class="bg-slate-900/50 border border-slate-700/50 rounded-lg px-2 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors hidden"></select>
                        <span class="text-slate-500 text-xs">at</span>
                        <select id="schedHour" class="bg-slate-900/50 border border-slate-700/50 rounded-lg px-2 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors"></select>
                        <button id="saveScheduleBtn" class="px-2 py-1 bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-medium rounded opacity-0 pointer-events-none transition-opacity ml-1">Save</button>
                    </div>
                </div>

                <div class="flex items-center gap-2 mt-1">
                    <div class="p-2 rounded-xl bg-indigo-500/10 text-indigo-400 shrink-0">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 relative flex items-center">
                        <input type="email" id="emailInput" placeholder="recipient@example.com" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg px-3 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors pr-12">
                        <button id="saveEmailBtn" class="absolute right-1 px-2 py-1 bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-medium rounded opacity-0 pointer-events-none transition-opacity">Save</button>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-xs font-semibold tracking-wider text-slate-400 mb-3 uppercase">Timing</h3>
                <div class="grid grid-cols-2 gap-y-2 text-sm">
                    <p class="text-slate-500">Started</p>
                    <p id="startTime" class="font-medium text-slate-200 text-right">--</p>
                    <p class="text-slate-500">Ended</p>
                    <p id="endTime" class="font-medium text-slate-200 text-right">--</p>
                    <p class="text-slate-500">Duration</p>
                    <p id="durationTime" class="font-medium text-slate-200 text-right">--</p>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6 flex items-center justify-around text-center">
                <div>
                    <i data-lucide="user-plus" class="w-6 h-6 text-green-400 mx-auto mb-2"></i>
                    <p class="text-3xl font-bold text-slate-100" id="statCreated">-</p>
                    <p class="text-xs text-slate-400 uppercase mt-1">Created</p>
                </div>
                <div class="w-px h-12 bg-slate-700/50"></div>
                <div>
                    <i data-lucide="refresh-cw" class="w-6 h-6 text-blue-400 mx-auto mb-2"></i>
                    <p class="text-3xl font-bold text-slate-100" id="statUpdated">-</p>
                    <p class="text-xs text-slate-400 uppercase mt-1">Updated</p>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center text-center">
                <i data-lucide="alert-triangle" class="w-6 h-6 text-red-500 mb-2"></i>
                <p class="text-3xl font-bold text-slate-100" id="statErrors">-</p>
                <p class="text-xs text-slate-400 uppercase mt-1">Errors</p>
            </div>
        </main>

        <!-- Logs Section -->
        <section class="mt-8">
            <h2 class="text-xl font-semibold text-slate-200 mb-6 flex items-center gap-2">
                <i data-lucide="terminal-square" class="w-5 h-5 text-indigo-400"></i>
                Sync Logs
            </h2>
            <div id="logsContainer" class="space-y-4 pb-12">
                <!-- JS will populate accordions here -->
                <div class="text-center p-8 text-slate-400">Loading logs overview...</div>
            </div>
        </section>

        <!-- Members Section -->
        <section class="mt-8">
            <h2 class="text-xl font-semibold text-slate-200 mb-4 flex items-center gap-2">
                <i data-lucide="users" class="w-5 h-5 text-indigo-400"></i>
                Member Sync History
            </h2>
            <div class="glass-card rounded-2xl p-5">
                <div class="flex items-center gap-3 mb-4">
                    <div class="relative flex-1">
                        <i data-lucide="search" class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="text" id="memberSearch" placeholder="Search by name or ID..." class="w-full bg-slate-900/50 border border-slate-700/50 rounded-lg pl-9 pr-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-indigo-500 transition-colors">
                    </div>
                    <span id="memberCount" class="text-xs text-slate-500 whitespace-nowrap">Loading...</span>
                </div>
                <div id="membersTable" class="overflow-hidden rounded-xl border border-slate-700/30">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-slate-800/50 text-left">
                                <th class="px-4 py-2.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">Name</th>
                                <th class="px-4 py-2.5 text-xs font-semibold text-slate-400 uppercase tracking-wider">PC ID</th>
                                <th class="px-4 py-2.5 text-xs font-semibold text-slate-400 uppercase tracking-wider text-center">Last Action</th>
                                <th class="px-4 py-2.5 text-xs font-semibold text-slate-400 uppercase tracking-wider text-right">Last Synced</th>
                            </tr>
                        </thead>
                        <tbody id="membersBody" class="divide-y divide-slate-700/30">
                            <tr><td colspan="4" class="text-center py-8 text-slate-500">Loading member data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- Member History Modal -->
    <div id="memberModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeMemberModal()"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-lg bg-slate-900 border-l border-slate-700/50 shadow-2xl overflow-y-auto">
            <div class="sticky top-0 bg-slate-900/95 backdrop-blur-sm border-b border-slate-700/30 px-6 py-4 flex items-center justify-between">
                <div>
                    <h3 id="modalMemberName" class="text-lg font-semibold text-slate-200"></h3>
                    <p id="modalMemberID" class="text-xs text-slate-500 mt-0.5"></p>
                </div>
                <button onclick="closeMemberModal()" class="p-2 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="modalTimeline" class="px-6 py-4">
            </div>
        </div>
    </div>

    <script>
        // State
        let logsList = [];
        let activeLog = null;
        let autoScrollState = {}; // { filename: boolean }
        let logContentCache = {}; // { filename: text }

        // Elements
        const syncNowBtn = document.getElementById('syncNowBtn');
        const syncNowText = document.getElementById('syncNowText');
        const syncNowIcon = document.getElementById('syncNowIcon');
        const logsContainer = document.getElementById('logsContainer');

        // Formatter utilities
        const formatLogDate = (logFilename) => {
            const match = logFilename.match(/sync_(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
            if(match) {
                const year = match[1], month = parseInt(match[2]) - 1, day = match[3];
                const hour = match[4], min = match[5], sec = match[6];
                const d = new Date(year, month, day, hour, min, sec);
                return d.toLocaleString(undefined, { 
                    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
                    hour: 'numeric', minute:'2-digit', second:'2-digit' 
                });
            }
            return logFilename;
        };

        const formatDate = (isoStr) => {
            if (!isoStr) return '--';
            const d = new Date(isoStr);
            return d.toLocaleString(undefined, { 
                month: 'short', day: 'numeric', 
                hour: '2-digit', minute:'2-digit', second:'2-digit' 
            });
        };

        const syntaxHighlightLog = (text) => {
            if (!text) return '';
            const escaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            return escaped.split('\n').map(line => {
                let colorClass = 'text-slate-300';
                if (line.includes('- ERROR -') || line.includes('FATAL ERROR')) {
                    colorClass = 'text-red-400 font-medium';
                } else if (line.includes('- WARNING -')) {
                    colorClass = 'text-amber-400';
                } else if (line.includes('- INFO -')) {
                    colorClass = 'text-blue-300';
                } else if (line.includes('- DEBUG -')) {
                    colorClass = 'text-slate-500';
                }
                return `<div class="log-line ${colorClass}">${line || ' '}</div>`;
            }).join('');
        };

        const updateStatusUI = (status) => {
            if (!status) return;
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            
            indicator.className = 'w-3 h-3 rounded-full';
            text.className = 'font-medium text-sm';
            
            if (status.status === 'Running') {
                indicator.classList.add('bg-blue-400', 'pulse-indicator');
                text.classList.add('text-blue-300');
                text.innerText = 'Sync Active';
            } else if (status.status === 'Success') {
                indicator.classList.add('bg-green-400');
                text.classList.add('text-green-300');
                text.innerText = 'Last Sync Successful';
            } else if (status.status === 'Failed') {
                indicator.classList.add('bg-red-500');
                text.classList.add('text-red-400');
                text.innerText = 'Last Sync Failed';
            } else {
                indicator.classList.add('bg-slate-500');
                text.classList.add('text-slate-400');
                text.innerText = status.status || 'Unknown';
            }

            document.getElementById('statCreated').innerText = status.created !== undefined ? status.created : '-';
            document.getElementById('statUpdated').innerText = status.updated !== undefined ? status.updated : '-';
            document.getElementById('statErrors').innerText = status.errors !== undefined ? status.errors : '-';
            document.getElementById('startTime').innerText = formatDate(status.start_time);
            document.getElementById('endTime').innerText = formatDate(status.end_time);
            
            if (status.start_time && status.end_time) {
                const s = new Date(status.start_time);
                const e = new Date(status.end_time);
                document.getElementById('durationTime').innerText = Math.round((e - s) / 1000) + ' sec';
            } else {
                document.getElementById('durationTime').innerText = '--';
            }
        };

        const rebuildLogsUI = () => {
            const safeId = (log) => log.replace(/[^a-zA-Z0-9_-]/g, '_');

            logsContainer.innerHTML = logsList.map(log => {
                const id = safeId(log);
                const readableDate = formatLogDate(log);
                return `
                <div class="glass-card rounded-xl overflow-hidden transition-all duration-300" id="accordion-${id}">
                    <button class="w-full px-6 py-4 flex justify-between items-center bg-slate-800/40 hover:bg-slate-700/40 transition-colors" onclick="toggleLog('${log}')">
                        <span class="font-medium text-slate-200 flex items-center gap-3">
                            <i data-lucide="file-text" class="w-5 h-5 text-indigo-400"></i> ${readableDate}
                        </span>
                        <i data-lucide="chevron-down" class="w-5 h-5 text-slate-500 transition-transform duration-300" id="chevron-${id}"></i>
                    </button>
                    <!-- Body: hidden by default -->
                    <div id="body-${id}" class="hidden flex-col h-[500px] border-t border-slate-700/50">
                        <!-- Toolbar -->
                        <div class="px-4 py-3 bg-slate-900/60 border-b border-slate-700/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div class="relative w-full max-w-md">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                                <input type="text" id="search-${id}" placeholder="Keyword search..." class="w-full bg-slate-800/50 border border-slate-700 text-slate-200 text-sm rounded-lg pl-9 pr-3 py-2 outline-none focus:border-indigo-500 transition-colors" oninput="searchLog('${log}')">
                            </div>
                            <button class="text-xs font-medium px-3 py-1.5 rounded-full bg-indigo-500/20 text-indigo-300 hover:bg-indigo-500/30 transition-colors flex items-center gap-2 shrink-0" id="autoScrollBtn-${id}" onclick="toggleAutoScroll('${log}')">
                                <div class="w-2 h-2 rounded-full bg-indigo-400" id="autoScrollDot-${id}"></div>
                                Auto-scroll
                            </button>
                        </div>
                        <!-- Viewer -->
                         <div class="flex-1 p-4 overflow-auto bg-slate-900/80 relative" id="scrollContainer-${id}" onscroll="handleScroll('${log}')">
                            <div id="loader-${id}" class="absolute inset-0 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm z-10 hidden">
                                <i data-lucide="loader-2" class="w-8 h-8 text-indigo-500 animate-spin"></i>
                            </div>
                            <pre id="pre-${id}" class="text-slate-300 whitespace-pre-wrap break-words text-xs sm:text-sm font-mono leading-relaxed">Loading...</pre>
                        </div>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
            
            // Re-open active log if it still exists
            if (activeLog && logsList.includes(activeLog)) {
                openAccordionDOM(activeLog);
            }
        };

        const safeId = (log) => log.replace(/[^a-zA-Z0-9_-]/g, '_');

        const openAccordionDOM = (log) => {
            const id = safeId(log);
            const body = document.getElementById(`body-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (body && chevron) {
                body.classList.remove('hidden');
                body.classList.add('flex');
                chevron.classList.add('rotate-180');
            }
        };

        const toggleLog = (log) => {
            const id = safeId(log);
            if (activeLog === log) {
                // Close it directly
                document.getElementById(`body-${id}`).classList.remove('flex');
                document.getElementById(`body-${id}`).classList.add('hidden');
                document.getElementById(`chevron-${id}`).classList.remove('rotate-180');
                activeLog = null;
                return;
            }
            
            if (activeLog) {
                // Close previously open
                const oldId = safeId(activeLog);
                const oldBody = document.getElementById(`body-${oldId}`);
                const oldChevron = document.getElementById(`chevron-${oldId}`);
                if (oldBody) {
                    oldBody.classList.remove('flex');
                    oldBody.classList.add('hidden');
                }
                if (oldChevron) oldChevron.classList.remove('rotate-180');
            }
            
            activeLog = log;
            openAccordionDOM(log);
            
            // Set default autoscroll if undefined
            if (autoScrollState[log] === undefined) autoScrollState[log] = true;
            updateAutoScrollUI(log);
            
            fetchLog(log);
        };

        const searchLog = (log) => {
            const id = safeId(log);
            const term = document.getElementById(`search-${id}`).value.toLowerCase();
            const pre = document.getElementById(`pre-${id}`);
            if (!pre) return;
            
            const lines = pre.querySelectorAll('.log-line');
            lines.forEach(line => {
                if (!term || line.textContent.toLowerCase().includes(term)) {
                    line.style.display = 'block';
                } else {
                    line.style.display = 'none';
                }
            });
        };

        const toggleAutoScroll = (log) => {
            autoScrollState[log] = !autoScrollState[log];
            updateAutoScrollUI(log);
            if (autoScrollState[log]) {
                const id = safeId(log);
                const container = document.getElementById(`scrollContainer-${id}`);
                if(container) container.scrollTop = container.scrollHeight;
            }
        };

        const updateAutoScrollUI = (log) => {
            const id = safeId(log);
            const btn = document.getElementById(`autoScrollBtn-${id}`);
            const dot = document.getElementById(`autoScrollDot-${id}`);
            if (!btn || !dot) return;
            
            if (autoScrollState[log]) {
                btn.className = "text-xs font-medium px-3 py-1.5 rounded-full bg-indigo-500/20 text-indigo-300 hover:bg-indigo-500/30 transition-colors flex items-center gap-2 shrink-0";
                dot.className = "w-2 h-2 rounded-full bg-indigo-400";
            } else {
                btn.className = "text-xs font-medium px-3 py-1.5 rounded-full bg-slate-500/20 text-slate-400 hover:bg-slate-500/30 transition-colors flex items-center gap-2 shrink-0";
                dot.className = "w-2 h-2 rounded-full bg-slate-500";
            }
        };

        const handleScroll = (log) => {
            const id = safeId(log);
            const container = document.getElementById(`scrollContainer-${id}`);
            // If user scrolls up, turn off autoscroll
            if (autoScrollState[log] && container.scrollTop < container.scrollHeight - container.clientHeight - 50) {
                toggleAutoScroll(log);
            }
        };

        const fetchLog = async (filename, silent = false) => {
            if (!filename) return;
            const id = safeId(filename);
            const loader = document.getElementById(`loader-${id}`);
            const pre = document.getElementById(`pre-${id}`);
            const container = document.getElementById(`scrollContainer-${id}`);
            
            if (!pre) return;
            if (!silent && loader) loader.classList.remove('hidden');
            
            try {
                const authQuery = window.location.search;
                let url = `/api/logs/${encodeURIComponent(filename)}${authQuery}`;
                if (!window.location.pathname.includes('/api/dashboard')) {
                    const basePath = window.location.pathname.replace('/dashboard', '');
                    url = `${basePath}/api/logs/${encodeURIComponent(filename)}${authQuery}`;
                }

                const res = await fetch(url);
                if (res.ok) {
                    const text = await res.text();
                    if (logContentCache[filename] !== text) {
                        logContentCache[filename] = text;
                        pre.innerHTML = syntaxHighlightLog(text);
                        // Re-apply search filter
                        searchLog(filename);
                        
                        if (autoScrollState[filename] && container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    }
                } else {
                    if (!silent) pre.innerHTML = `<span class="text-red-400">Failed to load: HTTP ${res.status}</span>`;
                }
            } catch (err) {
                if (!silent) pre.innerHTML = `<span class="text-red-400">Error: ${err.message}</span>`;
            } finally {
                if (!silent && loader) loader.classList.add('hidden');
            }
        };

        const fetchStatus = async () => {
            try {
                const url = window.location.pathname.includes('/api/dashboard') 
                    ? '/api/status' + window.location.search : '/api/status';
                
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.status && !data.status.error) {
                    updateStatusUI(data.status);
                }

                if (data.schedule) {
                    if (!scheduleUIFocused()) {
                        parseCronToUI(data.schedule);
                        document.getElementById('saveScheduleBtn').classList.replace('opacity-100', 'opacity-0');
                        document.getElementById('saveScheduleBtn').classList.add('pointer-events-none');
                        currentScheduleCron = data.schedule;
                    }
                }
                
                if (data.recipient_email !== undefined) {
                    const emailInput = document.getElementById('emailInput');
                    const saveEmailBtn = document.getElementById('saveEmailBtn');
                    if (document.activeElement !== emailInput) {
                        emailInput.value = data.recipient_email;
                        emailInput.dataset.original = data.recipient_email;
                        saveEmailBtn.classList.replace('opacity-100', 'opacity-0');
                        saveEmailBtn.classList.add('pointer-events-none');
                    }
                }
                
                if (data.logs && Array.isArray(data.logs)) {
                    if (data.logs.join(',') !== logsList.join(',')) {
                        const isNewLogAtTop = logsList.length > 0 && data.logs[0] !== logsList[0];
                        logsList = data.logs;
                        rebuildLogsUI();
                        
                        // Open latest log on initial load if none active
                        if (!activeLog && logsList.length > 0) {
                            toggleLog(logsList[0]);
                        } else if (isNewLogAtTop && data.status && data.status.status === 'Running') {
                            // Automatically switch to the newly created log when sync starts
                            toggleLog(logsList[0]);
                        }
                    }
                }
            } catch (err) {
                console.error("Failed to fetch status", err);
                document.getElementById('statusText').innerText = 'Connection Error';
                const ind = document.getElementById('statusIndicator');
                if(ind) ind.className = 'w-3 h-3 rounded-full bg-red-500';
            }
        };

        syncNowBtn.addEventListener('click', async () => {
            syncNowBtn.disabled = true;
            syncNowText.innerText = "Starting...";
            syncNowIcon.setAttribute('data-lucide', 'loader-2');
            syncNowIcon.classList.add('animate-spin');
            lucide.createIcons();

            try {
                const authQuery = window.location.search;
                let url = `/api/sync-now${authQuery}`;
                if (!window.location.pathname.includes('/api/dashboard')) {
                    const basePath = window.location.pathname.replace('/dashboard', '');
                    url = `${basePath}/api/sync-now${authQuery}`;
                }
                const res = await fetch(url, { method: 'POST' });
                if (res.ok) setTimeout(fetchStatus, 500);
            } finally {
                setTimeout(() => {
                    syncNowBtn.disabled = false;
                    syncNowText.innerText = "Run Sync Now";
                    syncNowIcon.setAttribute('data-lucide', 'play');
                    syncNowIcon.classList.remove('animate-spin');
                    lucide.createIcons();
                }, 2000);
            }
        });

        // ── Schedule Configuration Logic ──────────────────────────────────
        const schedFrequency = document.getElementById('schedFrequency');
        const schedDay = document.getElementById('schedDay');
        const schedHour = document.getElementById('schedHour');
        const saveScheduleBtn = document.getElementById('saveScheduleBtn');
        let currentScheduleCron = '';

        // Populate the hour dropdown (12 AM – 11 PM)
        for (let h = 0; h < 24; h++) {
            const lbl = h === 0 ? '12:00 AM' : h < 12 ? `${h}:00 AM` : h === 12 ? '12:00 PM' : `${h-12}:00 PM`;
            schedHour.insertAdjacentHTML('beforeend', `<option value="${h}">${lbl}</option>`);
        }

        function populateDayDropdown() {
            const freq = schedFrequency.value;
            schedDay.innerHTML = '';
            if (freq === 'weekly') {
                const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
                days.forEach((d, i) => schedDay.insertAdjacentHTML('beforeend', `<option value="${i}">${d}</option>`));
                schedDay.classList.remove('hidden');
            } else if (freq === 'monthly') {
                for (let d = 1; d <= 28; d++) {
                    const suffix = d===1?'st':d===2?'nd':d===3?'rd':'th';
                    schedDay.insertAdjacentHTML('beforeend', `<option value="${d}">${d}${suffix}</option>`);
                }
                schedDay.classList.remove('hidden');
            } else {
                schedDay.classList.add('hidden');
            }
        }

        function buildCronFromUI() {
            const freq = schedFrequency.value;
            const hour = schedHour.value;
            const day = schedDay.value;
            // Azure-style 6-field: sec min hour day month dow
            if (freq === 'daily')   return `0 0 ${hour} * * *`;
            if (freq === 'weekly')  return `0 0 ${hour} * * ${day}`;
            if (freq === 'monthly') return `0 0 ${hour} ${day} * *`;
            return `0 0 ${hour} * * *`;
        }

        function parseCronToUI(cron) {
            const p = cron.split(' ');
            if (p.length !== 6) return;
            const [, , hour, dayOfMonth, , dayOfWeek] = p;
            schedHour.value = hour;
            if (dayOfWeek !== '*') {
                schedFrequency.value = 'weekly';
                populateDayDropdown();
                schedDay.value = dayOfWeek;
            } else if (dayOfMonth !== '*') {
                schedFrequency.value = 'monthly';
                populateDayDropdown();
                schedDay.value = dayOfMonth;
            } else {
                schedFrequency.value = 'daily';
                populateDayDropdown();
            }
        }

        function scheduleUIFocused() {
            return [schedFrequency, schedDay, schedHour].includes(document.activeElement);
        }

        function checkScheduleChanged() {
            const newCron = buildCronFromUI();
            if (newCron !== currentScheduleCron) {
                saveScheduleBtn.classList.replace('opacity-0', 'opacity-100');
                saveScheduleBtn.classList.remove('pointer-events-none');
            } else {
                saveScheduleBtn.classList.replace('opacity-100', 'opacity-0');
                saveScheduleBtn.classList.add('pointer-events-none');
            }
        }

        schedFrequency.addEventListener('change', () => { populateDayDropdown(); checkScheduleChanged(); });
        schedDay.addEventListener('change', checkScheduleChanged);
        schedHour.addEventListener('change', checkScheduleChanged);
        populateDayDropdown(); // initial render

        saveScheduleBtn.addEventListener('click', async () => {
            const newCron = buildCronFromUI();
            saveScheduleBtn.innerText = '...';
            saveScheduleBtn.disabled = true;
            try {
                const res = await fetch('/api/config/schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ schedule: newCron })
                });
                if (res.ok) {
                    currentScheduleCron = newCron;
                    saveScheduleBtn.classList.replace('opacity-100', 'opacity-0');
                    saveScheduleBtn.classList.add('pointer-events-none');
                }
            } finally {
                saveScheduleBtn.innerText = 'Save';
                saveScheduleBtn.disabled = false;
            }
        });

        // Email Configuration Logic
        const emailInput = document.getElementById('emailInput');
        const saveEmailBtn = document.getElementById('saveEmailBtn');
        
        emailInput.addEventListener('input', () => {
            if (emailInput.value !== (emailInput.dataset.original || '')) {
                saveEmailBtn.classList.replace('opacity-0', 'opacity-100');
                saveEmailBtn.classList.remove('pointer-events-none');
            } else {
                saveEmailBtn.classList.replace('opacity-100', 'opacity-0');
                saveEmailBtn.classList.add('pointer-events-none');
            }
        });

        saveEmailBtn.addEventListener('click', async () => {
            const newEmail = emailInput.value.trim();
            saveEmailBtn.innerText = '...';
            saveEmailBtn.disabled = true;
            try {
                const authQuery = window.location.search;
                let url = `/api/config/email${authQuery}`;
                if (!window.location.pathname.includes('/api/dashboard')) {
                    url = `${window.location.pathname.replace('/dashboard', '')}/api/config/email${authQuery}`;
                }
                
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: newEmail })
                });
                
                if (res.ok) {
                    emailInput.dataset.original = newEmail;
                    saveEmailBtn.classList.replace('opacity-100', 'opacity-0');
                    saveEmailBtn.classList.add('pointer-events-none');
                }
            } finally {
                saveEmailBtn.innerText = 'Save';
                saveEmailBtn.disabled = false;
            }
        });

        // ── Member History Logic ──────────────────────────────────────────
        let memberData = {};

        async function fetchMembers() {
            try {
                const res = await fetch('/api/members');
                memberData = await res.json();
                renderMemberTable();
            } catch(e) {
                console.error('Failed to fetch members:', e);
            }
        }

        function getActionBadge(action) {
            const badges = {
                'UPDATED':   '<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-amber-500/15 text-amber-400">UPDATED</span>',
                'CREATED':   '<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-emerald-500/15 text-emerald-400">CREATED</span>',
                'NO_CHANGE': '<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-slate-500/15 text-slate-400">NO CHANGE</span>',
                'ERROR':     '<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-red-500/15 text-red-400">ERROR</span>',
            };
            return badges[action] || `<span class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-slate-500/15 text-slate-400">${action}</span>`;
        }

        function formatDate(iso) {
            try {
                const d = new Date(iso);
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' +
                       d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            } catch { return iso; }
        }

        function renderMemberTable(filter = '') {
            const tbody = document.getElementById('membersBody');
            const countEl = document.getElementById('memberCount');
            const entries = Object.entries(memberData).map(([id, m]) => ({
                id, name: m.name, events: m.events || [],
                lastEvent: (m.events && m.events.length) ? m.events[m.events.length - 1] : null
            }));

            const filtered = filter
                ? entries.filter(e => e.name.toLowerCase().includes(filter) || e.id.includes(filter))
                : entries;

            filtered.sort((a, b) => a.name.localeCompare(b.name));
            countEl.textContent = `${filtered.length} member${filtered.length !== 1 ? 's' : ''}`;

            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-slate-500">No members found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(m => `
                <tr class="hover:bg-slate-800/40 cursor-pointer transition-colors" onclick="openMemberModal('${m.id}')">
                    <td class="px-4 py-2.5 font-medium text-slate-200">${m.name}</td>
                    <td class="px-4 py-2.5 text-slate-500 font-mono text-xs">${m.id}</td>
                    <td class="px-4 py-2.5 text-center">${m.lastEvent ? getActionBadge(m.lastEvent.action) : '-'}</td>
                    <td class="px-4 py-2.5 text-right text-slate-400 text-xs">${m.lastEvent ? formatDate(m.lastEvent.date) : '-'}</td>
                </tr>
            `).join('');
        }

        function openMemberModal(pcId) {
            const m = memberData[pcId];
            if (!m) return;
            document.getElementById('modalMemberName').textContent = m.name;
            document.getElementById('modalMemberID').textContent = `PC ID: ${pcId}`;
            const timeline = document.getElementById('modalTimeline');
            const events = (m.events || []).slice().reverse(); // newest first

            if (!events.length) {
                timeline.innerHTML = '<p class="text-slate-500 text-sm py-4">No sync events recorded yet.</p>';
            } else {
                timeline.innerHTML = `
                    <div class="relative border-l-2 border-slate-700/50 ml-2 space-y-0">
                        ${events.map(ev => `
                            <div class="relative pl-6 pb-5">
                                <div class="absolute left-[-5px] top-1.5 w-2.5 h-2.5 rounded-full ${
                                    ev.action === 'UPDATED' ? 'bg-amber-400' :
                                    ev.action === 'CREATED' ? 'bg-emerald-400' :
                                    ev.action === 'ERROR'   ? 'bg-red-400' : 'bg-slate-500'
                                }"></div>
                                <div class="flex items-center gap-2 mb-1">
                                    ${getActionBadge(ev.action)}
                                    <span class="text-xs text-slate-500">${formatDate(ev.date)}</span>
                                </div>
                                ${ev.detail ? `<p class="text-xs text-slate-400 mt-1 leading-relaxed">${ev.detail}</p>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            document.getElementById('memberModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeMemberModal() {
            document.getElementById('memberModal').classList.add('hidden');
        }

        document.getElementById('memberSearch').addEventListener('input', (e) => {
            renderMemberTable(e.target.value.toLowerCase());
        });

        // Initialize and setup polling
        lucide.createIcons();
        fetchStatus();
        fetchMembers();
        
        setInterval(() => {
            fetchStatus();
            const statusText = document.getElementById('statusText');
            if (statusText && statusText.innerText === 'Sync Active' && activeLog) {
                fetchLog(activeLog, true);
            }
        }, 3000);
        // Refresh member data less frequently (every 30 seconds)
        setInterval(fetchMembers, 30000);
    </script>
</body>
</html>
