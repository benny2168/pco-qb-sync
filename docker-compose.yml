version: "3.8"

services:
  admin-portal:
    build: .
    image: admin-portal:v1.2
    container_name: admin-portal
    restart: unless-stopped
    ports:
      - "7365:7365"
    volumes:
      - ${PCO_CONFIG_DIR:-./config}:/app/config
      - ${PCO_DATA_DIR:-./data}:/app/data
      - ${PCO_LOGS_DIR:-./logs}:/app/logs
    environment:
      - TZ=America/Chicago
