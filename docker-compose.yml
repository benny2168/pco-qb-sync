version: "3.8"

services:
  pco-qb-sync:
    build: .
    container_name: pco-qb-sync
    restart: unless-stopped
    ports:
      - "8337:8080"
    volumes:
      - ${PCO_CONFIG_DIR:-./config}:/app/config
      - ${PCO_DATA_DIR:-./data}:/app/data
      - ${PCO_LOGS_DIR:-./logs}:/app/logs
    environment:
      - TZ=America/Chicago
