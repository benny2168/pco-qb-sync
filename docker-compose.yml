version: "3.8"

services:
  pco-qb-sync:
    build: .
    container_name: pco-qb-sync
    restart: unless-stopped
    ports:
      - "8337:8080"
    volumes:
      - ./.env:/app/.env
      - ./logs:/app/logs
      - ./config.json:/app/config.json
      - ./app.py:/app/app.py
      - ./sync_pc_to_qb.py:/app/sync_pc_to_qb.py
      - ./sync_donations_qb_to_pc.py:/app/sync_donations_qb_to_pc.py
      - ./dashboard.html:/app/dashboard.html
      - ./data:/app/data
      - ./static:/app/static
    environment:
      - TZ=America/Chicago
