version: "3.8"

services:
  pco-qb-sync:
    build: .
    container_name: pco-qb-sync
    restart: unless-stopped
    ports:
      - "8337:8080"
    volumes:
      - /volume1/docker/pco-qb-sync/config:/app/config
      - /volume1/docker/pco-qb-sync/data:/app/data
      - /volume1/docker/pco-qb-sync/logs:/app/logs
    environment:
      - TZ=America/Chicago
