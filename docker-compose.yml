version: "3.8"

services:
  pco-qb-sync:
    build: .
    container_name: pco-qb-sync
    restart: unless-stopped
    ports:
      - "8337:8080"
    volumes:
      - ${PCO_QB_SYNC_CONFIG_DIR:-.}:/app/config
      - ${PCO_QB_SYNC_DATA_DIR:-./data}:/app/data
      - ${PCO_QB_SYNC_LOGS_DIR:-./logs}:/app/logs
    environment:
      - TZ=America/Chicago
