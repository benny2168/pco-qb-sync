{% extends "base.html" %}

{% block content %}
<div class="mt-8">
    <h2 class="text-2xl font-semibold text-slate-200 mb-6">Available Modules</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for mod in modules %}
            {% if mod.allowed %}
            <a href="{{ mod.url }}" class="block group">
                <div class="glass-card rounded-2xl p-6 h-full flex flex-col hover:border-indigo-500/50 hover:bg-slate-800/80 transition-all duration-300">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 group-hover:scale-110 transition-transform">
                            <i data-lucide="{{ mod.icon }}" class="w-6 h-6"></i>
                        </div>
                        <h3 class="text-lg font-bold text-slate-200 group-hover:text-indigo-300 transition-colors">{{ mod.name }}</h3>
                    </div>
                    <p class="text-sm text-slate-400 flex-1">{{ mod.description }}</p>
                    <div class="mt-6 flex items-center text-xs font-semibold text-indigo-400 group-hover:text-indigo-300">
                        Launch Module <i data-lucide="arrow-right" class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            </a>
            {% endif %}
        {% endfor %}
        
        <!-- Placeholder for future modules to show visual consistency -->
        <div class="glass-card rounded-2xl p-6 h-full flex flex-col opacity-50 border-dashed border-slate-700/50">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 rounded-xl bg-slate-500/10 flex items-center justify-center text-slate-400">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-400">Add Module</h3>
            </div>
            <p class="text-sm text-slate-500 flex-1">Configure additional admin functions in app.py</p>
        </div>
    </div>
</div>
{% endblock %}
