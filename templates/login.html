<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PCO-QB Sync</title>
    <link rel="icon" type="image/svg+xml" href="/static/logos/pco-qb.svg">
    <meta property="og:image" content="{{ url_for('static', filename='logos/pco-qb-logo-og.png', _external=True) }}">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-text {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div class="glass-card w-[calc(100%-2rem)] max-w-[440px] mx-auto p-10 rounded-3xl text-center space-y-8 animate-in fade-in zoom-in duration-500">
        <div class="space-y-4">
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <img src="/static/logos/pco-logo.svg?v=2" class="h-10 w-auto" alt="PCO">
                <span class="gradient-text text-4xl font-bold relative -top-[3px] hidden sm:inline">↔</span>
                <img src="/static/logos/qb-logo.svg?v=2" class="h-10 w-auto" alt="QuickBooks">
            </div>
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight">
                <span class="gradient-text">Sync</span>
            </h1>
            <p class="text-slate-400 text-sm font-medium">Internal Administration Portal</p>
        </div>

        <div class="py-4">
            <div class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-indigo-500/20">
                <i data-lucide="shield-check" class="w-8 h-8 text-indigo-400"></i>
            </div>
            <p class="text-slate-300 text-sm leading-relaxed max-w-[240px] mx-auto">
                Access is restricted to authorized church administration personnel.
            </p>
        </div>

        <div class="space-y-4">
            <a href="/login" class="flex items-center justify-center gap-3 w-full max-w-xs mx-auto bg-white hover:bg-slate-50 text-slate-900 py-4 px-6 rounded-2xl font-semibold transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-white/5">
                <svg class="w-5 h-5" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fbb00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
                Sign in with Microsoft
            </a>
            
            {% if local_enabled %}
            <div class="pt-2">
                <a href="/local-login" class="text-xs text-slate-500 hover:text-indigo-400 transition-colors flex items-center justify-center gap-1.5 font-medium">
                    <i data-lucide="key" class="w-3 h-3"></i>
                    Local Admin Login
                </a>
            </div>
            {% endif %}
        </div>

        <div class="pt-4 border-t border-slate-700/30">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Secure Entra ID Authentication</p>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
